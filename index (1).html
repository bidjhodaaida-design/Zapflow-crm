<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZapFlow CRM</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #25D366;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 10px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  background: #25D366;
  color: white;
  border: none;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.status {
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 5px;
  color: white;
}

.interessado { background: orange; }
.negociando { background: blue; }
.pago { background: green; }
.entregue { background: gray; }
</style>

</head>
<body>

<header>ZapFlow CRM</header>

<div class="container">

<h3>Adicionar Cliente</h3>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="numero" placeholder="Número (ex: 25884xxxxxxx)">
<input type="text" id="produto" placeholder="Produto">
<input type="number" id="valor" placeholder="Valor (MZN)">

<select id="status">
  <option value="interessado">Interessado</option>
  <option value="negociando">Negociando</option>
  <option value="pago">Pago</option>
  <option value="entregue">Entregue</option>
</select>

<button onclick="addCliente()">Salvar Cliente</button>

<h3>Clientes</h3>
<div id="lista"></div>

</div>

<script>
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function salvar() {
  localStorage.setItem("clientes", JSON.stringify(clientes));
}

function addCliente() {
  let nome = document.getElementById("nome").value;
  let numero = document.getElementById("numero").value;
  let produto = document.getElementById("produto").value;
  let valor = document.getElementById("valor").value;
  let status = document.getElementById("status").value;

  if (!nome || !numero) {
    alert("Preencha nome e número");
    return;
  }

  clientes.push({ nome, numero, produto, valor, status });
  salvar();
  render();
}

function deletar(index) {
  clientes.splice(index, 1);
  salvar();
  render();
}

function abrirWhats(numero) {
  window.open("https://wa.me/" + numero, "_blank");
}

function render() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  clientes.forEach((c, i) => {
    lista.innerHTML += `
      <div class="card">
        <strong>${c.nome}</strong><br>
        Produto: ${c.produto || "-"}<br>
        Valor: ${c.valor || "-"} MZN<br>
        <span class="status ${c.status}">${c.status}</span><br><br>

        <button onclick="abrirWhats('${c.numero}')">WhatsApp</button>
        <button onclick="deletar(${i})">Apagar</button>
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
